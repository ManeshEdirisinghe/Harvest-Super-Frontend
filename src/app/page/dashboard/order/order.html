<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Orders & Billing</h1>
    <button (click)="toggleAddForm()"
      class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700 transition shadow-md">
      {{ showForm ? 'Close Form' : '+ Create New Order' }}
    </button>
  </div>

  @if (showForm) {
  <div class="bg-white border border-gray-200 rounded-lg p-6 shadow-md mb-6">

    <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">1. Order Information</h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Order ID</label>
        <input type="text" [(ngModel)]="orderObj.orderId" placeholder="Ex: O001"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Order Date</label>
        <input type="date" [(ngModel)]="orderObj.date"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Customer</label>
        <select [(ngModel)]="orderObj.custId" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
          <option value="" disabled selected>-- Select a Customer --</option>
          <option *ngFor="let cust of customerList" [value]="cust.id">
            {{cust.id}} - {{cust.name}}
          </option>
        </select>
      </div>
    </div>

    <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">2. Add Items to Order</h2>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-gray-50 p-4 rounded-lg border">
      <div class="col-span-1 md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Select Item</label>
        <select [(ngModel)]="tempOrderDetail.itemCode" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
          <option value="" disabled selected>-- Choose an Item --</option>
          <option *ngFor="let item of itemList" [value]="item.code">
            {{item.code}} - {{item.description}} (Stock: {{item.qtyOnHand}})
          </option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Quantity</label>
        <input type="number" [(ngModel)]="tempOrderDetail.qty" class="w-full px-4 py-2 border rounded-lg outline-none" min="1" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Discount (%)</label>
        <input type="number" [(ngModel)]="tempOrderDetail.discount" class="w-full px-4 py-2 border rounded-lg outline-none" min="0" />
      </div>
      <div class="col-span-1 md:col-span-4 flex justify-end mt-2">
        <button (click)="addToCart()" class="px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition">
          + Add to Cart
        </button>
      </div>
    </div>

    <div class="mt-6" *ngIf="cartItems.length > 0">
      <h3 class="text-md font-bold text-gray-800 mb-2">Cart Items</h3>
      <table class="w-full text-sm text-left border rounded-lg">
        <thead class="bg-gray-100 border-b">
          <tr>
            <th class="px-4 py-2 border-r">Item Code</th>
            <th class="px-4 py-2 border-r">Quantity</th>
            <th class="px-4 py-2 border-r">Discount</th>
            <th class="px-4 py-2 text-center">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cart of cartItems; let i = index" class="border-b">
            <td class="px-4 py-2 border-r font-medium">{{cart.itemCode}}</td>
            <td class="px-4 py-2 border-r">{{cart.qty}}</td>
            <td class="px-4 py-2 border-r">{{cart.discount}}</td>
            <td class="px-4 py-2 text-center">
              <button (click)="removeFromCart(i)" class="text-red-500 hover:text-red-700 font-semibold">Remove</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="flex justify-end gap-3 mt-8">
      <button (click)="toggleAddForm()" class="px-6 py-2.5 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition">
        Cancel
      </button>
      <button (click)="placeOrder()" class="px-6 py-2.5 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition shadow-lg">
        Place Final Order
      </button>
    </div>

  </div>
  }

  <div class="relative overflow-x-auto shadow-md rounded-lg border border-gray-200 mt-4">
    <table class="w-full text-sm text-left text-gray-600">
      <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b">
        <tr>
          <th class="px-6 py-3">No.</th>
          <th class="px-6 py-3">Order ID</th>
          <th class="px-6 py-3">Customer ID</th>
          <th class="px-6 py-3">Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orderList; index as i" class="bg-white border-b hover:bg-purple-50 transition">
          <td class="px-6 py-4 font-medium text-gray-800">{{i + 1}}</td>
          <td class="px-6 py-4 font-bold text-gray-800">{{order.orderId}}</td>
          <td class="px-6 py-4">{{order.custId}}</td>
          <td class="px-6 py-4">{{order.date}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
